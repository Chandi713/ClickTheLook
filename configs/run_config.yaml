# ---------------------------------------------------------------------------
# ClickTheLook — run configuration
# ---------------------------------------------------------------------------

# -- Model --
model: yolo11n.pt

# -- Core training --
epochs: 1
batch: 64
imgsz: 512
patience: 10
optimizer: AdamW

# -- Learning rate schedule --
lr0: 0.001
lrf: 0.1
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 1.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
cos_lr: true

# -- Regularisation --
label_smoothing: 0.1

# -- Augmentation --
hsv_h: 0.015
hsv_s: 0.2
hsv_v: 0.2
degrees: 5.0
translate: 0.05
scale: 0.2
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 0.5
mixup: 0.0

# -- Hardware --
workers: 8
amp: true
cache: ram   # false | ram | disk

# -- Run flags --
val: true
pretrained: true
verbose: true
run_name: yolo11_deepfashion2
